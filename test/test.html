        <!-- Language Selector -->
        <div class="language-selector">
          <div class="selector-button">
            <img
              src="https://www.learningtree.se/images/branding/flag-icon-se.svg"
              alt="Sweden"
              class="flag"
              id="selected-flag"
            />
            <span class="selected-text" id="selected-country">SE</span>
            <span class="arrow"><i class="fa-solid fa-angle-down"></i></span>
          </div>

          <div class="dropdown">
            <div
              class="dropdown-option"
              data-code="SE"
              data-flag="https://www.learningtree.se/images/branding/flag-icon-se.svg"

              <img
                src="https://www.learningtree.se/images/branding/flag-icon-se.svg"
                alt="Sweden"
              />
              <span>SE</span>
            </div>
            <div
              class="dropdown-option"
              data-code="CA"
              data-flag="https://flagcdn.com/w40/ca.png"
            >
              <img src="https://flagcdn.com/w40/ca.png" alt="Canada" />
              <span>CA</span>
            </div>
            <div
              class="dropdown-option"
              data-code="UK"
              data-flag="https://flagcdn.com/w40/gb.png"

              <img src="https://flagcdn.com/w40/gb.png" alt="UK" />

            </div>
            <div
              class="dropdown-option"
              data-code="US"
              data-flag="https://flagcdn.com/w40/us.png"
            >
              <img src="https://flagcdn.com/w40/us.png" alt="US" />
              <span>US</span>
            </div>
            <div
              class="dropdown-option"
              data-code="JP"
              data-flag="https://flagcdn.com/w40/jp.png"
            >
              <img src="https://flagcdn.com/w40/jp.png" alt="Japan" />
              <span>JP</span>
            </div>
